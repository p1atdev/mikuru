    username:
      pattern: "^[a-zA-Z0-9._]{1,30}$"
    request:
      method: GET
      redirects: follow
      headers:
        sec-fetch-mode: navigate
    rules:
      - result: not_found
        reason: Threads redirected the missing profile to login
        when:
          all:
            - type: url
              includes: /login/
      - result: found
        reason: Threads resolved the public profile
        when:
          all:
            - type: status
              in: [200]
          not:
            - type: url
              includes: /login/
    test:
      found: zuck
      notFoundTemplate: mikurucheck{random}

