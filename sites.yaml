        reason: Steam returned its profile error page
        when:
          all:
            - type: html
              selector: title
              text:
                includes: "Steam Community :: Error"
      - result: found
        reason: Steam returned a community profile
        when:
          all:
            - type: status
              in: [200]
          not:
            - type: html
