        accept: application/json
    rules:
      - result: found
        reason: Codeforces user API returned a profile
        when:
          all:
            - type: status
              in: [200]
            - type: json
              path: [status]
              equals: OK
            - type: json
              path: [result, 0, handle]
              exists: true
      - result: not_found
        reason: Codeforces user API did not find the handle
        when:
          all:
            - type: status
              in: [400]
